<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#322c24"/>
      <stop offset="1" stop-color="#1f1b16"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#3d805f"/>
      <stop offset="0.6" stop-color="#2F6B4F"/>
      <stop offset="1" stop-color="#27593f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#9ccaea"/>
      <stop offset="0.55" stop-color="#7FB8DC"/>
      <stop offset="1" stop-color="#69a6cf"/>
