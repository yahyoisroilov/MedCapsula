      <rect x="21" y="32" width="22" height="21" fill="url(#blue)"/>
      <rect x="21" y="31.1" width="22" height="1.8" fill="rgba(0,0,0,0.16)"/>
      <rect x="25.5" y="15.5" width="4.4" height="12.5" rx="2.2" fill="#ffffff" opacity="0.28"/>
    </g>
    <rect x="21" y="11" width="22" height="42" rx="11" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.2"/>
  </g>
